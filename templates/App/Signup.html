{% extends "base.html" %}
{% block title %}Sign-up{% endblock %}

{% block head %}
    {{ super() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block main %}

<div style="display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;">

    <div class="simple-container" style="border: 1px solid black;
                                        border-radius: 18px;
                                        padding: 15px;
                                        width: 50%;">
        <div>
            <h1 style="margin: 0px 0px 10px 0px;">Sign-Up</h1>
        </div>

        <div>
            <form method="post" style="border-top: 1px solid black;">
                <div class="simple-container">
                    <input class="input-text box-shadow form-item" name="username" type="text" placeholder="Username..">
                    <input class="input-text box-shadow form-item" name="password" type="password" placeholder="Password..">
                    <input class="input-text box-shadow form-item" name="password_confirmed" type="password" placeholder="Confirm Password..">
                    <button class="button-submit box-shadow form-item" type="submit">Sign-up</button>
                </div>
            </form>
        </div>

        {% include 'messageBar.html' %}
    </div>
</div>

{% endblock %}
